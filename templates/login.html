{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-5">
            <div class="text-center mb-4">
                <i class="bi bi-person-badge text-primary" style="font-size: 4rem;"></i>
                <h2 class="fw-bold mt-2">Acceso Seguro</h2>
            </div>
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">DNI</label>
                    <input type="text" class="form-control" name="dni" placeholder="12345678A" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <input type="password" class="form-control" name="password" placeholder="admin" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-pill">Entrar</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
