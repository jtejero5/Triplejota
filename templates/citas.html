{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-5">
            <h3 class="fw-bold text-primary border-bottom pb-3 mb-4">
                <i class="bi bi-calendar-plus me-2"></i>Solicitar Nueva Cita
            </h3>
            
            <form action="/citas" method="POST">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Especialidad Requerida</label>
                        <select class="form-select" name="especialidad" required>
                            <option value="" selected disabled>Seleccione especialidad...</option>
                            <option value="general">Medicina General</option>
                            <option value="pediatria">Pediatría</option>
                            <option value="traumatologia">Traumatología</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Profesional Médico</label>
                        <select class="form-select" name="medico">
                            <option value="cualquiera" selected>Cualquier profesional disponible</option>
                            <option value="dr_garcia">Dra. García (Medicina General)</option>
                            <option value="dr_morte">Dr. Morte (Traumatología)</option>
                        </select>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Fecha de la cita</label>
                        <input type="date" class="form-control" name="fecha" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Horario de preferencia</label>
                        <select class="form-select" name="horario">
                            <option value="manana">Mañana (08:00 - 14:00)</option>
                            <option value="tarde">Tarde (15:00 - 20:00)</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-semibold">Observaciones para el médico</label>
                    <textarea class="form-control" name="observaciones" rows="3" placeholder="Describa brevemente sus síntomas..."></textarea>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-primary px-5 rounded-pill fw-bold">Confirmar Cita</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
