{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-5 shadow-lg border-0">
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                    <i class="bi bi-calendar-plus text-primary h1 mb-0"></i>
                </div>
                <h2 class="fw-bold">Solicitar Cita Médica</h2>
                <p class="text-muted">Rellene los datos para agendar su visita.</p>
            </div>
           
            <form action="/citas" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold small">ESPECIALIDAD</label>
                    <select class="form-select rounded-pill" name="especialidad" required>
                        <option value="Medicina General">Medicina General</option>
                        <option value="Pediatría">Pediatría</option>
                        <option value="Traumatología">Traumatología</option>
                        <option value="Dermatología">Dermatología</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small">MÉDICO ASIGNADO</label>
                    <select class="form-select rounded-pill" name="medico" required>
                        <option value="Dra. García">Dra. García</option>
                        <option value="Dr. Morte">Dr. Morte</option>
                        <option value="Dr. Aguilar">Dr. Aguilar</option>
                        <option value="Dra. Tejero">Dra. Tejero</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">FECHA</label>
                        <input type="date" class="form-control rounded-pill" name="fecha" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">TURNO</label>
                        <select class="form-select rounded-pill" name="horario" required>
                            <option value="Mañana">Mañana</option>
                            <option value="Tarde">Tarde</option>
                        </select>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small">OBSERVACIONES</label>
                    <textarea class="form-control rounded-4" name="observaciones" rows="3" placeholder="Indique brevemente el motivo..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 btn-pill fw-bold">Confirmar Cita Médica</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
